<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ff8c42" />
    <title>ชิบะช่วยจำ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />

    <!-- PWA: ทำให้ติดตั้งบนมือถือได้ -->
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon-192.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ชิบะช่วยจำ" />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div class="splash-screen" id="splash-screen">
      <div class="splash-mark" aria-hidden="true">🐕</div>
    </div>
    <div class="login-screen" id="login-screen" hidden>
      <div class="login-card">
        <div class="brand-mark login-brand-mark" aria-hidden="true">🐕</div>
        <h1 id="login-title"></h1>
        <p id="login-copy"></p>
        <button class="google-signin-btn" id="google-signin-btn" type="button">
          <span>🔐</span> <span id="google-signin-text"></span>
        </button>
      </div>
    </div>
    <main class="app-shell" id="app-shell" hidden>
      <header class="topbar">
        <a class="brand" href="#today" aria-label="Shiba Remembers">
          <span class="brand-mark" aria-hidden="true">🐕</span>
          <span>ชิบะช่วยจำ</span>
        </a>
        <div class="topbar-actions">
          <label class="language-picker" for="language-select">
            <span aria-hidden="true">◎</span>
            <select id="language-select" aria-label="Language">
              <option value="th">ไทย</option>
              <option value="zh">中文</option>
              <option value="en">EN</option>
            </select>
          </label>
          <button class="avatar" type="button" aria-label="Profile">S</button>
        </div>
      </header>

      <div class="view" id="view-today">
        <section class="hero" id="today">
          <div>
            <p class="eyebrow" id="today-date"></p>
            <h1 id="welcome-title"></h1>
            <p class="hero-copy" id="hero-copy"></p>
          </div>
          <div class="shiba-illustration" aria-hidden="true">
            <span class="ear left-ear"></span><span class="ear right-ear"></span>
            <span class="shiba-face"><span class="eye left-eye"></span><span class="eye right-eye"></span><span class="muzzle"></span></span>
            <span class="paw">✦</span>
          </div>
        </section>

        <section class="quick-add" aria-label="Add a task">
          <form id="task-form">
            <input id="task-input" type="text" autocomplete="off" required />
            <button class="add-button" type="submit" aria-label="Add task">+</button>
          </form>
          <div class="quick-options">
            <button class="chip" type="button" data-time="today"><span>◷</span><span id="today-chip"></span></button>
            <button class="chip" type="button" data-time="tomorrow"><span>☀</span><span id="tomorrow-chip"></span></button>
            <button class="chip" type="button" id="priority-chip"><span>⚑</span><span id="priority-chip-text"></span></button>
            <div class="date-chip-wrap">
              <label class="chip" for="date-input" id="date-chip"><span>📅</span><span id="date-chip-text"></span></label>
              <input type="date" id="date-input" class="date-input-overlay" aria-label="Pick a due date" />
            </div>
            <select id="category-select" class="chip-select" aria-label="Category">
              <option value="general"></option>
              <option value="home"></option>
              <option value="study"></option>
              <option value="work"></option>
            </select>
            <select id="recurring-select" class="chip-select" aria-label="Repeat">
              <option value=""></option>
              <option value="daily"></option>
              <option value="weekly"></option>
              <option value="monthly"></option>
            </select>
          </div>
        </section>

        <section class="assistant-card" aria-live="polite">
          <div class="assistant-icon" aria-hidden="true">🐾</div>
          <div><p id="assistant-label"></p><strong id="assistant-message"></strong></div>
        </section>

        <section class="task-section">
          <div class="section-heading">
            <div><h2 id="task-heading"></h2><span id="task-count"></span></div>
            <button class="text-button" id="clear-done" type="button"></button>
          </div>
          <div class="task-list" id="task-list"></div>
        </section>

        <section class="upcoming-section">
          <div class="section-heading"><div><h2 id="upcoming-heading"></h2><span id="upcoming-subtitle"></span></div></div>
          <div class="upcoming-list" id="upcoming-list"></div>
        </section>
      </div>

      <div class="view-page" id="view-dashboard" hidden>
        <div class="section-heading">
          <div><h2 id="dashboard-heading"></h2></div>
        </div>
        <div class="scope-tabs" id="dashboard-scope-tabs">
          <button class="scope-tab selected" type="button" data-scope="month"></button>
          <button class="scope-tab" type="button" data-scope="quarter"></button>
          <button class="scope-tab" type="button" data-scope="year"></button>
        </div>
        <div class="dashboard-period-nav">
          <button type="button" id="dashboard-prev" aria-label="Previous period">‹</button>
          <strong id="dashboard-period-label"></strong>
          <button type="button" id="dashboard-next" aria-label="Next period">›</button>
        </div>
        <div class="dashboard-summary">
          <div class="dashboard-stat-card"><strong id="dash-stat-created"></strong><span id="dash-label-created"></span></div>
          <div class="dashboard-stat-card"><strong id="dash-stat-completed"></strong><span id="dash-label-completed"></span></div>
          <div class="dashboard-stat-card"><strong id="dash-stat-rate"></strong><span id="dash-label-rate"></span></div>
        </div>
        <div class="dashboard-chart-card">
          <div class="chart-bars" id="dashboard-chart"></div>
        </div>
      </div>

      <div class="view-page" id="view-calendar" hidden>
        <div class="section-heading">
          <div><h2 id="calendar-heading"></h2></div>
        </div>
        <div class="calendar-card">
          <div class="calendar-nav">
            <button type="button" id="calendar-prev" aria-label="Previous month">‹</button>
            <strong id="calendar-month-label"></strong>
            <button type="button" id="calendar-next" aria-label="Next month">›</button>
          </div>
          <div class="calendar-weekdays" id="calendar-weekdays"></div>
          <div class="calendar-grid" id="calendar-grid"></div>
        </div>
        <div class="calendar-legend">
          <span><i class="dot dot-today" aria-hidden="true"></i><span id="calendar-legend-today"></span></span>
        </div>
        <div class="calendar-agenda">
          <div class="section-heading">
            <div><h2 id="calendar-agenda-heading"></h2></div>
          </div>
          <div class="task-list" id="calendar-agenda-list"></div>
        </div>
      </div>

      <div class="view-page" id="view-lists" hidden>
        <div class="section-heading">
          <div><h2 id="lists-heading"></h2><span id="lists-count"></span></div>
        </div>
        <div class="filter-tabs" id="lists-filters">
          <button class="filter-tab selected" type="button" data-filter="all"></button>
          <button class="filter-tab" type="button" data-filter="today"></button>
          <button class="filter-tab" type="button" data-filter="tomorrow"></button>
          <button class="filter-tab" type="button" data-filter="priority"></button>
          <button class="filter-tab" type="button" data-filter="done"></button>
        </div>
        <div class="task-list" id="lists-task-list"></div>
      </div>

      <div class="view-page" id="view-profile" hidden>
        <div class="section-heading">
          <div><h2 id="profile-heading"></h2></div>
        </div>
        <p class="profile-hint" id="profile-signed-in-as"></p>
        <div class="profile-card">
          <div class="profile-avatar" aria-hidden="true">🌈</div>
          <div class="profile-stats">
            <div class="profile-stat"><strong id="profile-stat-total"></strong><span id="profile-label-total"></span></div>
            <div class="profile-stat"><strong id="profile-stat-done"></strong><span id="profile-label-done"></span></div>
            <div class="profile-stat"><strong id="profile-stat-pending"></strong><span id="profile-label-pending"></span></div>
          </div>
        </div>
        <div class="profile-section">
          <h3 id="profile-lang-heading"></h3>
          <div class="quick-options" id="profile-lang-options">
            <button class="chip" type="button" data-lang="th">ไทย</button>
            <button class="chip" type="button" data-lang="zh">中文</button>
            <button class="chip" type="button" data-lang="en">EN</button>
          </div>
        </div>
        <div class="profile-section">
          <h3 id="profile-theme-heading"></h3>
          <div class="quick-options" id="profile-theme-options">
            <button class="chip" type="button" data-theme-choice="auto"></button>
            <button class="chip" type="button" data-theme-choice="light"></button>
            <button class="chip" type="button" data-theme-choice="dark"></button>
          </div>
        </div>
        <div class="profile-section">
          <h3 id="profile-notif-heading"></h3>
          <p class="profile-hint" id="profile-notif-hint"></p>
          <button class="secondary-button" id="profile-notif-toggle" type="button"></button>
          <div class="notif-interval-row" id="notif-interval-row">
            <label id="notif-interval-label" for="notif-interval-select"></label>
            <select id="notif-interval-select" class="chip-select">
              <option value="30"></option>
              <option value="60"></option>
              <option value="120"></option>
              <option value="180"></option>
            </select>
          </div>
        </div>
        <div class="profile-section">
          <h3 id="profile-backup-heading"></h3>
          <p class="profile-hint" id="profile-backup-hint"></p>
          <div class="backup-buttons">
            <button class="secondary-button" id="profile-export" type="button"></button>
            <label class="secondary-button" for="import-file-input" id="profile-import-label"></label>
            <input type="file" id="import-file-input" accept="application/json,.json" class="sr-date-input" />
          </div>
        </div>
        <div class="profile-section">
          <button class="secondary-button" id="profile-signout" type="button"></button>
        </div>
        <div class="profile-section">
          <button class="danger-button" id="profile-reset" type="button"></button>
        </div>
      </div>
    </main>
    <nav class="bottom-nav" id="bottom-nav" aria-label="Main navigation" hidden>
      <button class="nav-item active" type="button" data-view="today"><span>⌂</span><span id="nav-today"></span></button>
      <button class="nav-item" type="button" data-view="dashboard"><span>📊</span><span id="nav-dashboard"></span></button>
      <button class="nav-item" type="button" data-view="calendar"><span>□</span><span id="nav-calendar"></span></button>
      <button class="nav-item" type="button" data-view="lists"><span>✓</span><span id="nav-lists"></span></button>
      <button class="nav-item" type="button" data-view="profile"><span>🌈</span><span id="nav-me"></span></button>
    </nav>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch((err) => {
            console.warn("SW registration failed:", err);
          });
        });
      }
    </script>
  </body>
</html>
